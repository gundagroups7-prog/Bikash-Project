name: Build Android SO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nmirror/setup-ndk@v1
        with:
          ndk-version: r21e
      - name: Build with NDK
        run: |
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk APP_ABI=arm64-v8a
      - name: Upload SO
        uses: actions/upload-artifact@v4
        with:
          name: libVikashPanel
          path: libs/arm64-v8a/libVikashPanel.so
